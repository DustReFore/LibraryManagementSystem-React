<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Авторы</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <div class="collapse navbar-collapse">
            <a class="navbar-brand" th:href="@{/}">Home</a>
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/books}">Books</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/authors}">Authors</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/readers}">Readers</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/orders}">Orders</a></li>
            </ul>
            <a class="btn btn-outline-dark" href="#">Login</a>
        </div>
    </div>
</nav>

<div class="container my-5">
    <h1 class="mb-4">Authors Catalog</h1>
    <a class="btn btn-primary mb-3" th:href="@{/authors/add}">Add Author</a>
    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Year of Birth</th>
                <th>Country</th>
                <th>Books</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="author : ${authors}">
                <td th:text="${author.id}"></td>
                <td th:text="${author.firstName}"></td>
                <td th:text="${author.lastName}"></td>
                <td th:text="${author.year}"></td>
                <td th:text="${author.country}"></td>
                <td>
                    <span th:each="book, iterStat : ${author.books}">
                        <span th:text="${book.title}"></span>
                        <span th:if="${!iterStat.last}">, </span>
                    </span>
                </td>

                <td>
                    <a class="btn btn-sm btn-warning" th:href="@{'/authors/edit/' + ${author.id}}">Edit</a>
                    <a class="btn btn-sm btn-danger" th:href="@{'/authors/delete/' + ${author.id}}">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
</body>
</html>
