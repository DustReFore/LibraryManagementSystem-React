<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Library Management System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <div class="collapse navbar-collapse">
            <a class="navbar-brand" th:href="@{/}">Home</a>
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/books}">Books</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/authors}">Authors</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/readers}">Readers</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/orders}">Orders</a></li>
            </ul>
            <a class="btn btn-outline-dark" href="#">Login</a>
        </div>
    </div>
</nav>

<header class="text-center my-5">
    <h1>Library Management System</h1>
    <p class="lead">Manage books, authors, and readers in one place</p>
    <a class="btn btn-primary btn-lg" th:href="@{/books}">Go to Book Catalog</a>
</header>

<div class="container my-5">
    <div class="row">
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">Book Catalog</h5>
                    <p class="card-text">View, add, and edit books.</p>
                    <a th:href="@{/books}" class="btn btn-primary">Open</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">Authors</h5>
                    <p class="card-text">Manage registered authors.</p>
                    <a th:href="@{/authors}" class="btn btn-primary">Open</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">Readers</h5>
                    <p class="card-text">Manage registered readers.</p>
                    <a th:href="@{/readers}" class="btn btn-primary">Open</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>
</html>
