<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${formTitle}"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <div class="collapse navbar-collapse">
            <a class="navbar-brand" th:href="@{/}">Home</a>
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/books}">Books</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/authors}">Authors</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/readers}">Readers</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/orders}">Orders</a></li>
            </ul>
            <a class="btn btn-outline-dark" href="#">Login</a>
        </div>
    </div>
</nav>

<div class="container my-5">
    <h1 th:text="${formTitle}"></h1>

    <form th:action="@{${formAction}}" th:object="${order}" method="post" class="mt-4">

        <div class="mb-3">
            <label class="form-label">Book</label>
            <select class="form-select" th:field="*{book.id}" required>
                <option th:each="book : ${books}"
                        th:value="${book.id}"
                        th:text="${book.title}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Reader</label>
            <select class="form-select" th:field="*{reader.id}" required>
                <option th:each="reader : ${readers}"
                        th:value="${reader.id}"
                        th:text="${reader.firstName + ' ' + reader.lastName}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Date Issued</label>
            <input type="date" class="form-control" th:field="*{dateIssued}">
        </div>

        <div class="mb-3">
            <label class="form-label">Date Returned</label>
            <input type="date" class="form-control" th:field="*{dateReturned}">
        </div>

        <button type="submit" class="btn btn-success" th:text="${submitText}"></button>
        <a th:href="@{/orders}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

</body>
</html>
