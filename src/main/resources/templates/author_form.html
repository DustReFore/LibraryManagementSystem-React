<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${formTitle}"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <div class="collapse navbar-collapse">
            <a class="navbar-brand" th:href="@{/}">Home</a>
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/books}">Books</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/authors}">Authors</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/readers}">Readers</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/orders}">Orders</a></li>
            </ul>
            <a class="btn btn-outline-dark" href="#">Login</a>
        </div>
    </div>
</nav>

<div class="container my-5">
    <h1 th:text="${formTitle}"></h1>

    <form th:action="@{${formAction}}" th:object="${author}" method="post" class="mt-4">

        <div class="mb-3">
            <label for="firstName" class="form-label">First Name</label>
            <input type="text" class="form-control" id="firstName" th:field="*{firstName}" required>
        </div>

        <div class="mb-3">
            <label for="lastName" class="form-label">Last Name</label>
            <input type="text" class="form-control" id="lastName" th:field="*{lastName}" required>
        </div>

        <div class="mb-3">
            <label for="year" class="form-label">Year of Birth</label>
            <input type="number" class="form-control" id="year" th:field="*{year}" required>
        </div>

        <div class="mb-3">
            <label for="country" class="form-label">Country</label>
            <input type="text" class="form-control" id="country" th:field="*{country}" required>
        </div>

        <button type="submit" class="btn btn-success" th:text="${submitText}"></button>
        <a th:href="@{/authors}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
