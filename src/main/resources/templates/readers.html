<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Читатели</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <div class="collapse navbar-collapse">
            <a class="navbar-brand" th:href="@{/}">Home</a>
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/books}">Books</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/authors}">Authors</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/readers}">Readers</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/orders}">Orders</a></li>
            </ul>
            <a class="btn btn-outline-dark" href="#">Login</a>
        </div>
    </div>
</nav>
<div class="container my-5">
    <h1 class="mb-4">Reader List</h1>
    <a class="btn btn-primary mb-3" th:href="@{/readers/add}">Add Reader</a>
    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Year of Birth</th>
            <th>Email</th>
            <th>Orders</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="reader : ${readers}">
            <td th:text="${reader.id}"></td>
            <td th:text="${reader.firstName}"></td>
            <td th:text="${reader.lastName}"></td>
            <td th:text="${reader.yearOfBirth}"></td>
            <td th:text="${reader.email}"></td>
            <td th:with="readerOrders=${ordersByReader[reader.id]}">
                <span th:if="${readerOrders == null or #lists.isEmpty(readerOrders)}">-</span>
                <span th:each="order, iterStat : ${readerOrders}">
                    <span th:text="${order.book != null ? order.book.title : '-'}"></span>
                    <span th:if="${not iterStat.last}">, </span>
                </span>
            </td>
            <td>
                <a class="btn btn-sm btn-warning" th:href="@{'/readers/edit/' + ${reader.id}}">Edit</a>
                <a class="btn btn-sm btn-danger" th:href="@{'/readers/delete/' + ${reader.id}}">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
